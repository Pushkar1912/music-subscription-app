<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Music Subscription</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Music Subscription</h1>
            <h2>Register</h2>

            <div id="error-msg" class="error-msg" style="display:none;"></div>
            <div id="success-msg" class="success-msg" style="display:none;"></div>

            <form id="register-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary">Register</button>
            </form>

            <p class="auth-link">Already have an account? <a href="index.html">Login here</a></p>

            <div class="backend-selector">
                <label for="backend-select">Backend:</label>
                <select id="backend-select">
                    <option value="ec2">EC2</option>
                    <option value="ecs">ECS</option>
                    <option value="lambda" selected>API Gateway + Lambda</option>
                </select>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        document.getElementById("register-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value.trim();
            const user_name = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();
            const errorDiv = document.getElementById("error-msg");
            const successDiv = document.getElementById("success-msg");
            errorDiv.style.display = "none";
            successDiv.style.display = "none";

            try {
                const resp = await apiCall("/register", "POST", { email, user_name, password });

                if (resp.error) {
                    errorDiv.textContent = resp.error;
                    errorDiv.style.display = "block";
                    return;
                }

                successDiv.textContent = "Registration successful! Redirecting to login...";
                successDiv.style.display = "block";
                setTimeout(() => { window.location.href = "index.html"; }, 1500);
            } catch (err) {
                errorDiv.textContent = "Registration failed. Please try again.";
                errorDiv.style.display = "block";
            }
        });
    </script>
</body>
</html>
